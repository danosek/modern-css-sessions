<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Editor – Modern CSS</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/danosek/modern-css-sessions@96aebbf859fd5406a8846d0afb3eb23d9980d18c/shared/spectro-theme.css">
  <script>document.documentElement.dataset.theme=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { overflow: hidden; }
  </style>
</head>
<body>
  <div id="app"></div>
  <!-- Root-absolute so it resolves when this page is served under /editor/ in dev. -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
