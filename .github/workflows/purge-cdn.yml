name: Purge jsDelivr CDN cache

on:
  push:
    branches: [main]
    paths:
      - 'shared/demo-base.css'
      - 'shared/spectro-theme.css'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge shared CSS from jsDelivr
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/shared/demo-base.css"
          curl -sf "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/shared/spectro-theme.css"
          echo "CDN cache purged"
