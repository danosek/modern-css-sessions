<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>color-scheme – Modern CSS S2</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/danosek/modern-css-sessions@0d1c6370d9c33bbb47bdadd1e2bc20553e22af21/shared/spectro-theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/danosek/modern-css-sessions@0d1c6370d9c33bbb47bdadd1e2bc20553e22af21/shared/demo-base.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="theme-toggle"
    onclick="document.documentElement.dataset.theme =
      document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'">
    Toggle theme
  </button>

  <div class="demo-header">
    <div class="demo-session">S2 – Colors & Typography</div>
    <h1 class="demo-title">color-scheme</h1>
    <span class="demo-feature">
      <span class="demo-feature__kw">color-scheme</span><span class="demo-feature__sep">·</span><span class="demo-feature__kw">prefers-color-scheme</span>
    </span>
  </div>

  <div class="demo-stage">

  </div>

  <script src="script.js"></script>
</body>
</html>
